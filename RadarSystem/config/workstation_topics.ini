# RadarSystem workstation topic QoS bindings.
# Format: <topic> = <profile>
# Available profiles: best_effort, reliable, reliable_transient,
#                     event_bus, latched, streaming,
#                     persistent, heartbeat, critical
#
# Both sides are kept in sync intentionally: in DDS, a writer and a reader
# on the same topic negotiate compatibility, and many QoS pairs (e.g.
# RELIABLE writer / BEST_EFFORT reader) form a one-way downgrade. Keeping
# both sides aligned makes the configuration easy to reason about.

# --- topics the workstation subscribes to ----------
ComponentStatus        = xml:ComponentStatusDurable
RadarTrack             = xml:RadarTrackStreaming
CommandStatus          = reliable
SystemAlarm            = latched
RawIQSample            = streaming

# --- topics the workstation publishes ----------
Command                = reliable
ComponentStatusRequest = best_effort
TrackingCue            = reliable
OperatorAuditLog       = event_bus

# --- workstation <-> workstation chat ----------
OperatorChat           = reliable
