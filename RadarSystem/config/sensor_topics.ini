# RadarSystem sensor topic QoS bindings.
# Format: <topic> = <profile>
# Available profiles: best_effort, reliable, reliable_transient,
#                     event_bus, latched, streaming,
#                     persistent, heartbeat, critical
#
# Per the iteration-2 spec:
#   - Command + CommandStatus must be reliable.
#   - ComponentStatus is durable so a workstation that joins late immediately
#     learns the current component state.
#   - RadarTrack is best-effort (high-rate live data; latest matters most).
#   - ComponentStatusRequest is best-effort (it's a poll; the response carries
#     the value, and the poll is repeated periodically anyway).
#
# Iteration-3 additions:
#   - SystemAlarm:      latched      — each distinct alarm is latched per key,
#                                      late joiners see the current alarm set.
#   - OperatorAuditLog: event_bus    — never drop a session-active log entry.
#   - RawIQSample:      streaming    — newest beat wins, drops under load OK.
#   - TrackingCue:      reliable     — cues are infrequent and must arrive.

# --- topics the sensor publishes ----------
# ComponentStatus + RadarTrack are bound via the DDS-XML profile file
# (radar_qos.xml) to prove the XML path works end-to-end. The XML profiles
# intentionally mirror the built-in `reliable_transient` / `best_effort`
# behaviour so you can swap the prefix off (`reliable_transient` /
# `best_effort`) without changing behaviour.
ComponentStatus        = xml:ComponentStatusDurable
RadarTrack             = xml:RadarTrackStreaming
CommandStatus          = reliable
SystemAlarm            = latched
RawIQSample            = streaming

# --- topics the sensor subscribes to ----------
Command                = reliable
ComponentStatusRequest = best_effort
TrackingCue            = reliable
OperatorAuditLog       = event_bus
