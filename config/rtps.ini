# OpenDDS configuration: use the RTPS discovery + RTPS UDP transport so we do
# not need a separate DCPSInfoRepo process. Discovery is fully peer-to-peer
# over multicast/unicast, which is perfect for a single-container or
# multi-container experiment.
[common]
DCPSGlobalTransportConfig=$file
DCPSDefaultDiscovery=DEFAULT_RTPS

[transport/the_rtps_transport]
transport_type=rtps_udp
